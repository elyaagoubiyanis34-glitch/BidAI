<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BidAI — Connexion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700..900;1,9..144,700..900&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#FAF9F4;--bg2:#F2EFE7;--card:#fff;--border:#DDD9CE;--border2:#C8C3B5;
  --text:#1A1A12;--muted:#6A6658;--muted2:#A39F93;
  --green:#0BBF6A;--green-dark:#088A4C;--green-light:#E6F8EF;--green-glow:rgba(11,191,106,0.18);
  --red:#D94F4F;--display:'Fraunces',Georgia,serif;--body:'Outfit',system-ui,sans-serif;
  --shadow:0 4px 32px rgba(0,0,0,.08),0 1px 4px rgba(0,0,0,.04);
}
html,body{height:100%}
body{font-family:var(--body);background:var(--bg);color:var(--text);display:flex;flex-direction:column;min-height:100vh}

/* BG decoration */
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle,rgba(0,0,0,.055) 1px,transparent 1px);background-size:28px 28px;mask-image:radial-gradient(ellipse 80% 70% at 50% 50%,black 20%,transparent 80%);pointer-events:none;z-index:0}
body::after{content:'BidAI';position:fixed;bottom:-60px;right:-40px;font-family:var(--display);font-size:220px;font-weight:900;font-style:italic;color:transparent;-webkit-text-stroke:1px rgba(11,191,106,0.06);pointer-events:none;z-index:0;user-select:none;white-space:nowrap}

nav{position:relative;z-index:10;padding:1.25rem 2rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.logo{font-family:var(--display);font-size:22px;font-weight:900;font-style:italic;color:var(--text);text-decoration:none}
.logo em{color:var(--green);font-style:normal}
.back-link{font-size:13px;color:var(--muted);transition:color .2s}
.back-link:hover{color:var(--text)}

.main{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;position:relative;z-index:1}

.auth-card{background:var(--card);border:1.5px solid var(--border);border-radius:20px;padding:2.75rem;width:100%;max-width:420px;box-shadow:var(--shadow)}
.auth-card::before{content:'';display:block;height:4px;background:linear-gradient(90deg,var(--green),rgba(11,191,106,0.2),transparent);border-radius:4px 4px 0 0;margin:-2.75rem -2.75rem 2rem;border-radius:18px 18px 0 0}

.auth-title{font-family:var(--display);font-size:26px;font-weight:900;letter-spacing:-.03em;margin-bottom:.35rem}
.auth-title em{font-style:italic;color:var(--green)}
.auth-sub{font-size:14px;color:var(--muted);margin-bottom:2rem;font-weight:300}

.tabs{display:flex;gap:0;margin-bottom:2rem;background:var(--bg2);border-radius:10px;padding:4px}
.tab{flex:1;padding:.55rem;text-align:center;font-size:14px;font-weight:600;cursor:pointer;border-radius:8px;transition:all .2s;color:var(--muted);border:none;background:none;font-family:var(--body)}
.tab.active{background:var(--card);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.08)}

.form-group{margin-bottom:1rem}
label{display:block;font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
input[type=email],input[type=password],input[type=text]{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:.75rem 1rem;font-size:14px;color:var(--text);font-family:var(--body);outline:none;transition:all .2s}
input:focus{border-color:var(--green);background:var(--card);box-shadow:0 0 0 3px rgba(11,191,106,0.1)}

.btn-auth{width:100%;background:var(--green);color:#fff;border:none;border-radius:12px;padding:.9rem;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--body);transition:all .25s;margin-top:.5rem;box-shadow:0 4px 16px var(--green-glow)}
.btn-auth:hover{background:var(--green-dark);transform:translateY(-1px)}
.btn-auth:disabled{opacity:.45;cursor:not-allowed;transform:none}

.divider-or{display:flex;align-items:center;gap:1rem;margin:1.25rem 0;color:var(--muted2);font-size:12px}
.divider-or::before,.divider-or::after{content:'';flex:1;height:1px;background:var(--border)}

.btn-magic{width:100%;background:var(--bg);color:var(--text);border:1.5px solid var(--border2);border-radius:12px;padding:.85rem;font-size:14px;font-weight:600;cursor:pointer;font-family:var(--body);transition:all .2s}
.btn-magic:hover{border-color:var(--green);color:var(--green);background:var(--green-light)}

.msg{border-radius:10px;padding:.85rem 1rem;font-size:13px;margin-top:1rem;display:none;font-weight:400}
.msg.success{background:var(--green-light);color:var(--green-dark);border:1px solid rgba(11,191,106,0.25)}
.msg.error{background:#FDF0F0;color:var(--red);border:1px solid rgba(217,79,79,0.2)}
.msg.show{display:block}

.forgot{text-align:right;margin-top:.35rem}
.forgot a{font-size:12px;color:var(--muted);transition:color .2s}
.forgot a:hover{color:var(--green)}

.hidden{display:none!important}

@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
</style>
</head>
<body>
<nav>
  <a href="/" class="logo">Bid<em>AI</em></a>
  <a href="/" class="back-link">← Retour au site</a>
</nav>

<div class="main">
  <div class="auth-card">
    <div class="auth-title">Bienvenue sur <em>BidAI</em></div>
    <div class="auth-sub">Connectez-vous ou créez votre compte pour accéder à l'espace adhérent.</div>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Connexion</button>
      <button class="tab" onclick="switchTab('signup')">Créer un compte</button>
    </div>

    <!-- LOGIN -->
    <div id="form-login">
      <div class="form-group">
        <label>Adresse email</label>
        <input type="email" id="login-email" placeholder="vous@entreprise.fr" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
        <div class="forgot"><a href="#" onclick="showForgot()">Mot de passe oublié ?</a></div>
      </div>
      <button class="btn-auth" id="login-btn" onclick="login()">Se connecter</button>

      <div class="divider-or">ou</div>
      <button class="btn-magic" onclick="magicLink('login')">Connexion par lien magique (email)</button>
    </div>

    <!-- SIGNUP -->
    <div id="form-signup" class="hidden">
      <div class="form-group">
        <label>Prénom et nom</label>
        <input type="text" id="signup-name" placeholder="Jean Dupont">
      </div>
      <div class="form-group">
        <label>Entreprise</label>
        <input type="text" id="signup-company" placeholder="Nom de votre société">
      </div>
      <div class="form-group">
        <label>Adresse email</label>
        <input type="email" id="signup-email" placeholder="vous@entreprise.fr" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" id="signup-password" placeholder="8 caractères minimum" autocomplete="new-password">
      </div>
      <button class="btn-auth" id="signup-btn" onclick="signup()">Créer mon compte</button>
    </div>

    <!-- FORGOT -->
    <div id="form-forgot" class="hidden">
      <p style="font-size:14px;color:var(--muted);margin-bottom:1.25rem;font-weight:300">Entrez votre email — nous vous enverrons un lien pour réinitialiser votre mot de passe.</p>
      <div class="form-group">
        <label>Adresse email</label>
        <input type="email" id="forgot-email" placeholder="vous@entreprise.fr">
      </div>
      <button class="btn-auth" onclick="resetPassword()">Envoyer le lien</button>
      <div style="text-align:center;margin-top:1rem"><a href="#" onclick="showLogin()" style="font-size:13px;color:var(--muted)">← Retour à la connexion</a></div>
    </div>

    <div class="msg" id="auth-msg"></div>
  </div>
</div>

<script>
/* ── CONFIG — REMPLACEZ CES VALEURS ── */
const SUPABASE_URL = 'https://mohwccfmjolimwrhhcev.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1vaHdjY2Ztam9saW13cmhoY2V2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMjA2NDUsImV4cCI6MjA4OTU5NjY0NX0.XGUcE7u9J9gu2CyxfuIrR2tBCr0VW6JxNTrvQsd65xc';

const sb = supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);

/* Redirect si déjà connecté */
sb.auth.getSession().then(({data:{session}})=>{
  if(session) window.location.href='/app/dashboard.html';
});

/* Auth state listener */
sb.auth.onAuthStateChange((event, session)=>{
  if(event==='SIGNED_IN' && session){
    window.location.href='/app/dashboard.html';
  }
});

function switchTab(t){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('form-login').classList.toggle('hidden', t!=='login');
  document.getElementById('form-signup').classList.toggle('hidden', t!=='signup');
  document.getElementById('form-forgot').classList.add('hidden');
  hideMsg();
}

function showForgot(){
  event.preventDefault();
  document.getElementById('form-login').classList.add('hidden');
  document.getElementById('form-forgot').classList.remove('hidden');
  hideMsg();
}
function showLogin(){
  event.preventDefault();
  document.getElementById('form-forgot').classList.add('hidden');
  document.getElementById('form-login').classList.remove('hidden');
  hideMsg();
}

function showMsg(txt, type){
  const el=document.getElementById('auth-msg');
  el.textContent=txt;el.className='msg '+type+' show';
}
function hideMsg(){document.getElementById('auth-msg').className='msg'}

function setLoading(id, loading, label){
  const btn=document.getElementById(id);
  btn.disabled=loading;
  btn.innerHTML=loading?`<span class="spinner"></span>${label}...`:label;
}

async function login(){
  const email=document.getElementById('login-email').value.trim();
  const password=document.getElementById('login-password').value;
  if(!email||!password){showMsg('Remplissez tous les champs.','error');return}
  setLoading('login-btn',true,'Connexion');
  const {error}=await sb.auth.signInWithPassword({email,password});
  setLoading('login-btn',false,'Se connecter');
  if(error)showMsg(error.message,'error');
}

async function signup(){
  const name=document.getElementById('signup-name').value.trim();
  const company=document.getElementById('signup-company').value.trim();
  const email=document.getElementById('signup-email').value.trim();
  const password=document.getElementById('signup-password').value;
  if(!name||!email||!password){showMsg('Remplissez tous les champs.','error');return}
  if(password.length<8){showMsg('Le mot de passe doit contenir au moins 8 caractères.','error');return}
  setLoading('signup-btn',true,'Création');
  const {error}=await sb.auth.signUp({
    email,password,
    options:{data:{full_name:name,company}}
  });
  setLoading('signup-btn',false,'Créer mon compte');
  if(error)showMsg(error.message,'error');
  else showMsg('Compte créé ! Vérifiez votre email pour confirmer votre inscription.','success');
}

async function magicLink(type){
  const emailId=type==='login'?'login-email':'signup-email';
  const email=document.getElementById(emailId)?.value?.trim();
  if(!email){showMsg('Entrez votre adresse email.','error');return}
  const {error}=await sb.auth.signInWithOtp({email,options:{emailRedirectTo:window.location.origin+'/app/dashboard.html'}});
  if(error)showMsg(error.message,'error');
  else showMsg('Lien envoyé ! Vérifiez votre boîte email.','success');
}

async function resetPassword(){
  const email=document.getElementById('forgot-email').value.trim();
  if(!email){showMsg('Entrez votre adresse email.','error');return}
  const {error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:window.location.origin+'/app/reset-password.html'});
  if(error)showMsg(error.message,'error');
  else showMsg('Email de réinitialisation envoyé !','success');
}
</script>
</body>
</html>
